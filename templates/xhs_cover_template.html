<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>XHS Cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      display: flex; flex-direction: column;
      align-items: center; padding: 24px; gap: 16px;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    /* ── Card 600×800 ────────────────────────────────── */
    #card {
      width: 600px; height: 800px;
      position: relative; overflow: hidden;
      flex-shrink: 0;
    }

    /* Background: full-bleed image */
    .bg-image {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 45%;
      display: block;
    }
    .bg-fallback {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #a8d8a2 0%, #5ba05a 45%, #2d6e36 100%);
      display: none;
    }

    /* Gradient overlay: lighten top (title legibility) + darken bottom (footer) */
    .bg-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.12) 0%,
        rgba(0,0,0,0.04)       45%,
        rgba(0,0,0,0.50)       80%,
        rgba(0,0,0,0.68)      100%
      );
    }

    /* ── Content layer ───────────────────────────────── */
    .content {
      position: absolute; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      padding: 44px 36px 0;
    }

    /* ── Title box: white rounded rect ───────────────── */
    .title-box {
      background: #ffffff;
      border-radius: 14px;
      padding: 24px 30px 22px;
      margin-bottom: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }

    .zh-title {
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 54px; line-height: 1.22;
      font-weight: 900;
      color: #1A2B4A;
      word-break: break-all;
      letter-spacing: -0.5px;
    }

    /* Red-orange highlight for key words */
    .zh-title .hl { color: #E8453C; }

    /* ── Hashtag ─────────────────────────────────────── */
    .hashtag {
      font-family: "Noto Sans SC", "PingFang SC", sans-serif;
      font-size: 26px; font-weight: 400;
      color: #eeeeee;
      text-shadow: 0 1px 4px rgba(0,0,0,0.55);
      padding-left: 2px;
    }

    /* push footer to bottom */
    .spacer { flex: 1; }

    /* ── Footer attribution strip ────────────────────── */
    .footer {
      background: rgba(0,0,0,0.55);
      padding: 13px 24px 16px;
      margin: 0 -36px;  /* bleed to card edges */
    }

    .footer-source {
      font-size: 15px; line-height: 1.5;
      color: rgba(255,255,255,0.82);
      font-style: italic;
    }

    .footer-pub {
      font-size: 14px; line-height: 1.4;
      color: rgba(255,255,255,0.75);
      margin-top: 1px;
      font-style: italic;
    }

    .footer-author {
      font-size: 14px; line-height: 1.4;
      color: rgba(255,255,255,0.68);
      margin-top: 1px;
      font-style: italic;
    }

    /* ── Browser-only controls (Playwright ignores) ───── */
    .dl-btn {
      padding: 10px 28px; background: #4f46e5; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .dl-btn:hover { background: #4338ca; }
    .status { font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>

<div id="card">
  <img class="bg-image" id="bg-img" src="PLACEHOLDER_IMAGE_PATH" alt=""
       onerror="this.style.display='none';document.getElementById('bg-fallback').style.display='block'">
  <div class="bg-fallback" id="bg-fallback"></div>
  <div class="bg-overlay"></div>

  <div class="content">
    <div class="title-box">
      <div class="zh-title">PLACEHOLDER_HIGHLIGHTED_HTML</div>
    </div>
    <div class="hashtag">PLACEHOLDER_HASHTAG</div>
    <div class="spacer"></div>
    <div class="footer">
      <div class="footer-source">来源：PLACEHOLDER_EN_TITLE</div>
      <div class="footer-pub">PLACEHOLDER_PUBLICATION</div>
      <div class="footer-author">作者：PLACEHOLDER_AUTHOR</div>
    </div>
  </div>
</div>

<button class="dl-btn" onclick="captureAndDownload()">重新下载封面</button>
<p class="status" id="status">封面预览中…</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  async function captureAndDownload() {
    const status = document.getElementById("status");
    status.textContent = "截图中…";
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 500));
    try {
      const canvas = await html2canvas(document.getElementById("card"), {
        scale: 2, useCORS: true, allowTaint: false,
        backgroundColor: null, width: 600, height: 800,
        windowWidth: 648, windowHeight: 848
      });
      const link = document.createElement("a");
      link.download = "cover_PLACEHOLDER_DATE.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
      status.textContent = "✅ 已下载 cover_PLACEHOLDER_DATE.png";
    } catch(e) {
      status.textContent = "❌ " + e.message;
    }
  }
  if (!navigator.webdriver) window.addEventListener("load", captureAndDownload);
</script>
</body>
</html>
